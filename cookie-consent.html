<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cookie consent</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    #cookie-banner {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #cookie-banner .panel {
      background: #fff;
      padding: 32px;
      max-width: 420px;
      border-radius: 8px;
    }
    button { margin-right: 8px; padding: 10px 16px; }
    #accept-all { background: #0051ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="cookie-banner" class="cookie-banner" role="dialog" aria-label="Cookie consent">
    <div class="panel">
      <h1>Cookie consent</h1>
      <p>We use cookies and similar technologies to improve your experience. Please review our privacy preference center.</p>
      <button type="button" id="accept-all">Accept All</button>
      <button type="button">Reject</button>
    </div>
  </div>
  <script>
    document.getElementById("accept-all").addEventListener("click", () => {
      window.location.href = "app.html";
    });
  </script>
</body>
</html>
