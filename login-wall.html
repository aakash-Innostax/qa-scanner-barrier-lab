<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In Required</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 480px; margin: 80px auto; padding: 20px; }
    input { display: block; width: 100%; margin: 8px 0 16px; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 20px; }
  </style>
</head>
<body>
  <h1>Sign in required</h1>
  <p>Please sign in to continue. Authentication is required to access this application.</p>
  <form>
    <label>Email <input type="email" placeholder="Email" /></label>
    <label>Password <input type="password" placeholder="Password" /></label>
    <button type="submit">Sign In</button>
  </form>
</body>
</html>
