<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Just a moment...</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 60px auto;
      padding: 20px;
      line-height: 1.6;
      color: #222;
    }
    h1 { font-size: 22px; }
    label { display: block; margin: 20px 0; }
    button {
      padding: 10px 24px;
      border: none;
      background: #0051ff;
      color: white;
      cursor: pointer;
      border-radius: 4px;
    }
    button:disabled {
      background: #9bb8ff;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <main>
    <h1>Security check</h1>
    <p>Performing security verification</p>
    <p>Verify you are human before continuing.</p>
    <label>
      <input type="checkbox" id="human-check" aria-label="Verify you are human" />
      I am human
    </label>
    <p>
      <button type="button" id="continue-btn" disabled>Continue</button>
    </p>
  </main>
  <script>
    const checkbox = document.getElementById("human-check");
    const button = document.getElementById("continue-btn");
    checkbox.addEventListener("change", () => {
      button.disabled = !checkbox.checked;
    });
    button.addEventListener("click", () => {
      window.location.href = "app.html";
    });
  </script>
</body>
</html>
